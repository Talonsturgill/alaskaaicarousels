<!doctype html>
<!-- DEMO SLIDE 3 — "Streamline Field": seeded simplex flow field on Canvas 2D
     (2x backing store), collision-spaced long curves, tapered strokes, type
     knockout plate. Reference for: noise.js, canvas conventions, renderReady.
     Plumbing reference, not a style template. -->
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="@@ASSETS@@/fonts/fonts.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body { background: #0a1020; position: relative; }
  canvas#field { position: absolute; inset: 0; width: 1080px; height: 1350px; }
  .head { position: absolute; top: 96px; left: 96px; right: 96px; }
  .kicker { font-family: "JetBrains Mono", monospace; font-size: 24px; font-weight: 500;
            letter-spacing: 0.16em; color: #ffc72c; margin-bottom: 22px; }
  h2 { font-family: "Archivo", sans-serif; font-stretch: 118%; font-weight: 800;
       font-size: 92px; line-height: 1.0; letter-spacing: -0.015em; color: #f2f6fd; }
  .body-plate { position: absolute; left: 96px; bottom: 120px; max-width: 620px;
                background: rgba(7, 11, 22, 0.72); backdrop-filter: blur(10px);
                border-left: 3px solid #3ce6b4; padding: 34px 40px; }
  .body-plate p { font-family: "Manrope", sans-serif; font-size: 34px; font-weight: 500;
                  line-height: 1.42; color: rgba(222, 233, 246, 0.95); }
  .body-plate p b { color: #3ce6b4; font-weight: 700; }
  .counter { position: absolute; right: 96px; bottom: 96px; font-family: "JetBrains Mono", monospace;
             font-size: 24px; color: rgba(255, 255, 255, 0.55); }
</style>
</head>
<body>
  <canvas id="field" width="2160" height="2700"></canvas>
  <div class="head">
    <div class="kicker">ENGINE PROOF · GENERATIVE STRUCTURE</div>
    <h2>Ten thousand decisions per frame</h2>
  </div>
  <div class="body-plate">
    <p>This current is a <b>seeded flow field</b>: 900 curves tracing a simplex
       noise gradient, spaced by collision detection, tapered by age.</p>
  </div>
  <div class="counter">03 / 04</div>

<script src="@@ASSETS@@/js/noise.js"></script>
<script>
window.renderReady = new Promise((resolve) => {
  const cv = document.getElementById("field");
  const cx = cv.getContext("2d");
  cx.scale(2, 2);
  const W = 1080, H = 1350;

  AK.reseed(20260708);
  const R = AK.rng(99);

  // occupancy grid for collision spacing
  const cell = 7;
  const gw = Math.ceil(W / cell), gh = Math.ceil(H / cell);
  const occ = new Uint8Array(gw * gh);
  const isFree = (x, y) => {
    if (x < -120 || x > W + 120 || y < -120 || y > H + 120) return false;
    if (x < 0 || y < 0 || x >= W || y >= H) return true;
    return !occ[(y / cell | 0) * gw + (x / cell | 0)];
  };
  const claim = (x, y) => {
    if (x >= 0 && y >= 0 && x < W && y < H) occ[(y / cell | 0) * gw + (x / cell | 0)] = 1;
  };

  const angle = (x, y) => AK.fbm2(x * 0.0016, y * 0.0016, { octaves: 4 }) * Math.PI * 2.2;
  const palette = t => {
    // deep teal -> mint -> pale ice, warm gold rarely
    if (t > 0.985) return "rgba(255,199,44,0.9)";
    const c0 = [22, 84, 108], c1 = [60, 230, 180], c2 = [223, 243, 255];
    const m = t < 0.6 ? c0.map((v, i) => v + (c1[i] - v) * (t / 0.6))
                      : c1.map((v, i) => v + (c2[i] - v) * ((t - 0.6) / 0.4));
    return `rgba(${m[0] | 0},${m[1] | 0},${m[2] | 0},0.75)`;
  };

  let drawn = 0;
  for (let n = 0; n < 2600 && drawn < 900; n++) {
    let x = R() * (W + 240) - 120, y = R() * (H + 240) - 120;
    const pts = [];
    for (let s = 0; s < 240; s++) {
      if (!isFree(x, y)) break;
      pts.push([x, y]);
      const a = angle(x, y);
      x += Math.cos(a) * 3.2;
      y += Math.sin(a) * 3.2;
    }
    if (pts.length < 24) continue;
    drawn++;
    const tone = R();
    cx.strokeStyle = palette(tone);
    cx.lineCap = "round";
    for (let i = 0; i < pts.length - 1; i++) {
      const taper = 1 - Math.abs(i / pts.length - 0.5) * 2;   // fat middle, thin ends
      cx.lineWidth = 0.5 + taper * 2.6;
      cx.beginPath();
      cx.moveTo(pts[i][0], pts[i][1]);
      cx.lineTo(pts[i + 1][0], pts[i + 1][1]);
      cx.stroke();
    }
    for (const [px, py] of pts) claim(px, py);
  }

  // vignette to seat the field
  const vg = cx.createRadialGradient(W / 2, H / 2, H * 0.28, W / 2, H / 2, H * 0.78);
  vg.addColorStop(0, "rgba(10,16,32,0)");
  vg.addColorStop(1, "rgba(6,9,18,0.55)");
  cx.fillStyle = vg;
  cx.fillRect(0, 0, W, H);

  resolve(true);
});
</script>
</body>
</html>
