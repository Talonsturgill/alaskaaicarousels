<!doctype html>
<!-- DEMO SLIDE 1 — "Title-Card Hook": aurora veil atmosphere (feTurbulence +
     displacement + screen blend), grain pass, Fraunces display type, mono
     telemetry footer. Reference for: SVG filter atmospheres, type setting,
     decorative markers. NOT a style template — plumbing reference only. -->
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="@@ASSETS@@/fonts/fonts.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body { background: #070b16; position: relative; font-family: "Fraunces", serif; }

  .sky { position: absolute; inset: 0;
         background: linear-gradient(180deg, #02060f 0%, #081426 55%, #0d2038 100%); }
  svg.aurora { position: absolute; inset: 0; mix-blend-mode: screen; }

  .grain { position: absolute; inset: 0; opacity: 0.10; mix-blend-mode: overlay;
           background-repeat: repeat; }

  .content { position: absolute; inset: 0; padding: 96px; display: flex;
             flex-direction: column; justify-content: flex-end; }
  .kicker { font-family: "JetBrains Mono", monospace; font-weight: 500;
            font-size: 26px; letter-spacing: 0.14em; color: #ffc72c;
            margin-bottom: 28px; }
  h1 { font-weight: 860; font-size: 148px; line-height: 0.98;
       letter-spacing: -0.015em; color: #f4f8ff;
       font-variation-settings: "opsz" 144; margin-bottom: 34px; }
  h1 .glow { color: #3ce6b4; }
  .dek { font-family: "Manrope", sans-serif; font-weight: 500; font-size: 40px;
         line-height: 1.32; color: rgba(214, 228, 245, 0.92); max-width: 820px;
         margin-bottom: 72px; }
  .footer { display: flex; justify-content: space-between; align-items: baseline;
            border-top: 1px solid rgba(255, 199, 44, 0.35); padding-top: 22px; }
  .brand { font-family: "Fraunces", serif; font-weight: 800; font-size: 30px;
           color: #fff; }
  .coords { font-family: "JetBrains Mono", monospace; font-size: 24px;
            color: rgba(255, 255, 255, 0.55); letter-spacing: 0.08em; }
  .counter { font-family: "JetBrains Mono", monospace; font-size: 24px;
             color: rgba(255, 255, 255, 0.55); }
  .star { position: absolute; top: 88px; right: 96px; }
</style>
</head>
<body>
  <div class="sky"></div>

  <svg class="aurora" width="1080" height="1350" viewBox="0 0 1080 1350">
    <defs>
      <filter id="curtain1" x="-30%" y="-30%" width="160%" height="160%">
        <feTurbulence type="fractalNoise" baseFrequency="0.004 0.045" numOctaves="2" seed="7" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="160" xChannelSelector="R" yChannelSelector="G"/>
        <feGaussianBlur stdDeviation="18"/>
      </filter>
      <filter id="curtain2" x="-30%" y="-30%" width="160%" height="160%">
        <feTurbulence type="fractalNoise" baseFrequency="0.006 0.03" numOctaves="2" seed="23" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="200" xChannelSelector="R" yChannelSelector="G"/>
        <feGaussianBlur stdDeviation="24"/>
      </filter>
      <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#3ce6b4" stop-opacity="0.85"/>
        <stop offset="70%" stop-color="#5ac8f0" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#5ac8f0" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#9664e6" stop-opacity="0.55"/>
        <stop offset="80%" stop-color="#3ce6b4" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <rect x="60" y="-40" width="330" height="700" fill="url(#g1)" filter="url(#curtain1)"/>
    <rect x="420" y="-60" width="260" height="560" fill="url(#g2)" filter="url(#curtain2)"/>
    <rect x="700" y="-30" width="300" height="640" fill="url(#g1)" filter="url(#curtain2)" opacity="0.7"/>
  </svg>

  <canvas id="stars" width="2160" height="2700" style="position:absolute; inset:0; width:1080px; height:1350px;"></canvas>

  <svg class="star" width="72" height="72" viewBox="0 0 72 72">
    <g fill="#ffc72c">
      <path d="M36 2 L40.5 28 L66 32 L40.5 36 L36 66 L31.5 36 L6 32 L31.5 28 Z"/>
    </g>
    <circle cx="36" cy="32" r="30" fill="none" stroke="rgba(255,199,44,0.3)" stroke-width="1"/>
  </svg>

  <div class="content">
    <div class="kicker">ALASKA.AI · CAROUSEL No. 000 · ENGINE PROOF</div>
    <h1>The night sky<br>runs on <span class="glow">code</span></h1>
    <div class="dek">Every layer of this frame was drawn by hand-written code: turbulence-displaced aurora curtains, a seeded starfield, vector type.</div>
    <div class="footer">
      <div class="brand">ALASKA.AI</div>
      <div class="coords" data-decorative>61°13′N · 149°54′W</div>
      <div class="counter">01 / 04</div>
    </div>
  </div>

  <div class="grain" id="grain"></div>

<script src="@@ASSETS@@/js/noise.js"></script>
<script>
  // Seeded starfield: brightness-varied points, brightest get soft halos.
  const cv = document.getElementById("stars");
  const cx = cv.getContext("2d");
  cx.scale(2, 2);
  document.getElementById("grain").style.backgroundImage =
    `url(${AK.grainTile(280, 52, 11)})`;
  const R = AK.rng(20260708);
  for (let i = 0; i < 210; i++) {
    const x = R() * 1080, y = R() * 720 * (0.4 + 0.6 * R());
    const m = R();
    const r = m < 0.92 ? 0.8 + m : 2.2 + (m - 0.92) * 14;
    if (r > 2) {
      const halo = cx.createRadialGradient(x, y, 0, x, y, r * 5);
      halo.addColorStop(0, "rgba(255,225,150,0.55)");
      halo.addColorStop(1, "rgba(255,225,150,0)");
      cx.fillStyle = halo;
      cx.beginPath(); cx.arc(x, y, r * 5, 0, 7); cx.fill();
    }
    cx.fillStyle = `rgba(235,242,255,${0.35 + 0.6 * m})`;
    cx.beginPath(); cx.arc(x, y, r, 0, 7); cx.fill();
  }
</script>
</body>
</html>
