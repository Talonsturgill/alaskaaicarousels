<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Videos - Alaska AI</title>
<meta name="description" content="Daily short videos on Alaska and AI. Every fact verified to its source. Swipe through the feed.">
<meta name="theme-color" content="#02060f">
<meta property="og:site_name" content="Alaska AI">
<meta property="og:title" content="Videos - Alaska AI">
<meta property="og:description" content="Daily short videos on Alaska and AI. Every fact verified to its source.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://alaskaaihq.com/videos/">
<meta property="og:image" content="https://alaskaaihq.com/og.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="https://alaskaaihq.com/videos/">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Crect%20width%3D%27100%27%20height%3D%27100%27%20rx%3D%2716%27%20fill%3D%27%2302060f%27%2F%3E%3Ctext%20x%3D%2750%27%20y%3D%2768%27%20font-size%3D%2752%27%20text-anchor%3D%27middle%27%20fill%3D%27%23ffc72c%27%20font-family%3D%27serif%27%3E%E2%96%B6%3C%2Ftext%3E%3C%2Fsvg%3E">
<link rel="preconnect" href="https://raw.githubusercontent.com">
<link rel="preload" href="videos.json" as="fetch" crossorigin>
<link rel="preload" href="../fonts/fraunces.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="../fonts/manrope.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="../fonts/jbmono-md.woff2" as="font" type="font/woff2" crossorigin>
<style>
:root{--night:#02060f;--deep:#050b16;--panel:#0a1626;--panel2:#0e2138;--line:#1c3350;
--snow:#f4f8ff;--body:#c3d2e6;--mute:#8da2be;--gold:#ffc72c;--halo:#ffda6e;--green:#3ce6b4;}
@font-face{font-family:Fraunces;src:url(../fonts/fraunces.woff2) format("woff2");font-weight:100 900;font-display:swap;}
@font-face{font-family:JBMono;src:url(../fonts/jbmono-md.woff2) format("woff2");font-weight:500;font-display:swap;}
@font-face{font-family:Manrope;src:url(../fonts/manrope.woff2) format("woff2");font-weight:200 800;font-display:swap;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--night);color:var(--body);
font-family:Manrope,system-ui,sans-serif;overscroll-behavior-y:contain;}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:4px;}
a{color:inherit;}

/* ---------- top bar (overlay) ---------- */
.topbar{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;align-items:center;
justify-content:space-between;padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
background:linear-gradient(180deg,rgba(2,6,15,.88),rgba(2,6,15,.55) 70%,transparent);
pointer-events:none;}
.topbar>*{pointer-events:auto;}
.wordmark{display:flex;align-items:center;gap:9px;text-decoration:none;
font-family:JBMono,monospace;font-size:13px;letter-spacing:.14em;color:var(--snow);}
.wordmark b{color:var(--gold);font-weight:500;}
.navlinks{display:flex;gap:14px;font-family:JBMono,monospace;font-size:11px;letter-spacing:.12em;}
.navlinks a{text-decoration:none;color:var(--mute);padding:6px 2px;}
.navlinks a:hover{color:var(--snow);}
.navlinks a.on{color:var(--gold);}
@media(max-width:560px){.navlinks a.hidesm{display:none;}}

/* ---------- feed ---------- */
.feed{height:100dvh;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;}
.feed::-webkit-scrollbar{display:none;}
.card{position:relative;height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;
display:flex;align-items:center;justify-content:center;background:var(--night);}
/* the 9:16 stage: full-bleed on phones, centered column on wide screens */
.stage{position:relative;height:100%;aspect-ratio:9/16;max-width:100vw;background:#000;
overflow:hidden;}
@media(min-width:700px){
  .stage{height:min(94dvh,1000px);border-radius:18px;border:1px solid var(--line);
  box-shadow:0 30px 80px rgba(0,0,0,.6);}
}
.stage video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;}
.stage .poster{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
transition:opacity .35s;}
.stage.playing .poster{opacity:0;pointer-events:none;}

/* tap layer: play/pause */
.tap{position:absolute;inset:0;border:0;background:transparent;cursor:pointer;}
.pauseglyph{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);
width:84px;height:84px;border-radius:50%;background:rgba(2,6,15,.55);border:1px solid var(--line);
display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s,transform .2s;
pointer-events:none;}
.card.paused .pauseglyph{opacity:1;transform:translate(-50%,-50%) scale(1);}
.pauseglyph svg{width:34px;height:34px;fill:var(--snow);margin-left:5px;}

/* meta overlay */
.meta{position:absolute;left:0;right:64px;bottom:0;padding:18px 16px calc(20px + env(safe-area-inset-bottom));
background:linear-gradient(0deg,rgba(2,6,15,.85),rgba(2,6,15,.45) 60%,transparent);
pointer-events:none;}
.meta>*{pointer-events:auto;}
.kicker{font-family:JBMono,monospace;font-size:10.5px;letter-spacing:.16em;color:var(--gold);
text-transform:uppercase;margin-bottom:6px;}
.title{font-family:Fraunces,serif;font-weight:800;font-size:clamp(19px,4.6vw,24px);
line-height:1.15;color:var(--snow);margin-bottom:7px;text-wrap:balance;}
.cap{font-size:13.5px;line-height:1.5;color:var(--body);max-width:52ch;
display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer;}
.cap.open{-webkit-line-clamp:unset;}

/* right-rail actions */
.rail{position:absolute;right:8px;bottom:calc(86px + env(safe-area-inset-bottom));z-index:5;
display:flex;flex-direction:column;gap:16px;align-items:center;}
.rbtn{width:46px;height:46px;border-radius:50%;border:1px solid var(--line);cursor:pointer;
background:rgba(10,22,38,.72);display:flex;align-items:center;justify-content:center;
transition:transform .12s,border-color .12s;backdrop-filter:blur(6px);}
.rbtn:hover{transform:scale(1.08);border-color:var(--gold);}
.rbtn svg{width:21px;height:21px;fill:none;stroke:var(--snow);stroke-width:1.8;
stroke-linecap:round;stroke-linejoin:round;}
.rbtn.toast svg{stroke:var(--green);}

/* progress hairline (scaleX only, never layout) */
.prog{position:absolute;left:0;right:0;bottom:0;height:3px;background:rgba(255,255,255,.12);z-index:6;}
.prog i{display:block;height:100%;width:100%;background:linear-gradient(90deg,var(--gold),var(--halo));
transform:scaleX(0);transform-origin:0 50%;will-change:transform;}

/* buffering spinner (waiting -> playing) */
.spin{position:absolute;top:50%;left:50%;width:36px;height:36px;margin:-18px 0 0 -18px;z-index:4;
border-radius:50%;border:3px solid rgba(244,248,255,.18);border-top-color:var(--gold);
opacity:0;transition:opacity .25s .2s;pointer-events:none;animation:vspin .8s linear infinite;}
.card.buffering .spin{opacity:1;}
@keyframes vspin{to{transform:rotate(360deg)}}

/* unmute pill (shown while feed is muted) */
.unmute{position:fixed;z-index:45;left:50%;transform:translateX(-50%);
top:calc(58px + env(safe-area-inset-top));display:none;align-items:center;gap:8px;
background:rgba(10,22,38,.85);border:1px solid var(--gold);color:var(--snow);cursor:pointer;
font-family:JBMono,monospace;font-size:11.5px;letter-spacing:.1em;padding:9px 16px;border-radius:99px;
backdrop-filter:blur(6px);}
body.muted .unmute{display:flex;}
.unmute svg{width:15px;height:15px;fill:var(--gold);}

/* desktop up/down nav */
.stepper{position:fixed;right:22px;top:50%;transform:translateY(-50%);z-index:40;
display:none;flex-direction:column;gap:10px;}
@media(min-width:900px){.stepper{display:flex;}}
.stepper button{width:44px;height:44px;border-radius:50%;border:1px solid var(--line);
background:rgba(10,22,38,.72);color:var(--snow);font-size:17px;cursor:pointer;}
.stepper button:hover{border-color:var(--gold);color:var(--gold);}

.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);}
.loading{height:100dvh;display:flex;align-items:center;justify-content:center;
font-family:JBMono,monospace;font-size:12px;letter-spacing:.15em;color:var(--mute);}
noscript div{padding:40vh 20px 0;text-align:center;font-family:JBMono,monospace;}
</style>
</head>
<body class="muted">

<nav class="topbar" aria-label="Site">
  <a class="wordmark" href="../"><b>&#9654;</b><span>ALASKA<b>.AI</b> VIDEOS</span></a>
  <div class="navlinks">
    <a href="../">HOME</a>
    <a href="../docket/" class="hidesm">THE DOCKET</a>
    <a href="../archive/" class="hidesm">ARTICLES</a>
    <a href="../videos/" class="on">VIDEOS</a>
  </div>
</nav>

<button class="unmute" id="unmute" type="button">
  <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4z"/></svg>
  TAP FOR SOUND
</button>

<div class="stepper" aria-hidden="true">
  <button id="prev" title="Previous video (arrow up)">&#9650;</button>
  <button id="next" title="Next video (arrow down)">&#9660;</button>
</div>

<main class="feed" id="feed" tabindex="0" aria-label="Video feed">
  <div class="loading" id="loading">LOADING THE FEED&hellip;</div>
</main>

<noscript><div>The video feed needs JavaScript. See our articles at <a href="../archive/">alaskaaihq.com/archive</a>.</div></noscript>

<script>
(async function(){
  const feed = document.getElementById('feed');
  const loading = document.getElementById('loading');
  let manifest;
  try{
    manifest = await (await fetch('videos.json')).json();
  }catch(e){
    loading.textContent = 'COULD NOT LOAD THE FEED. TRY A REFRESH.';
    return;
  }
  const base = manifest.media_base || '';
  const vids = (manifest.videos || []).filter(v => v && v.video);
  if(!vids.length){ loading.textContent = 'NO VIDEOS YET. CHECK BACK TOMORROW.'; return; }
  const abs = u => /^https?:\/\//.test(u) ? u : base + u;
  const fmtDate = d => { try{
    return new Date(d + 'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  }catch(e){ return d; } };

  // ---- source selection: 720p renditions + jpeg thumbs on phones, full
  // masters only on wide viewports with a healthy connection. Entries
  // published before the renditions exist (or tomorrow's fresh entry) may
  // lack the mobile fields, so always fall back to video/poster. ----
  const conn = navigator.connection || {};
  const slowNet = !!(conn.saveData || /2g$/.test(conn.effectiveType || ''));
  const wantFull = window.innerWidth >= 900 && !slowNet;
  const srcOf = v => (!wantFull && v.video_mobile) ? abs(v.video_mobile) : abs(v.video);
  const posterOf = v => {
    const p = (!wantFull && v.poster_thumb) ? v.poster_thumb : v.poster;
    return p ? abs(p) : '';
  };

  // ---- build cards ----
  const frag = document.createDocumentFragment();
  vids.forEach((v,i)=>{
    const card = document.createElement('section');
    card.className = 'card';
    card.id = v.id;
    card.dataset.idx = i;
    const psrc = posterOf(v);
    card.innerHTML = `
      <div class="stage">
        <video playsinline loop muted preload="none" ${psrc ? `poster="${psrc}"` : ''} data-src="${srcOf(v)}" aria-label="${v.title.replace(/"/g,'&quot;')}"></video>
        ${psrc ? `<img class="poster" src="${psrc}" alt="" loading="lazy">` : ''}
        <button class="tap" type="button" aria-label="Play or pause"></button>
        <div class="pauseglyph" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        <div class="spin" aria-hidden="true"></div>
        <div class="meta">
          <div class="kicker">ALASKA AI DISPATCH &middot; ${fmtDate(v.date)}</div>
          <h2 class="title">${v.title}</h2>
          ${v.caption ? `<p class="cap" title="Tap to expand">${v.caption}</p>` : ''}
        </div>
        <div class="rail">
          <button class="rbtn mutebtn" type="button" aria-label="Toggle sound">
            <svg viewBox="0 0 24 24"><path class="spk" d="M4 9.5v5h3.5L12 18.5v-13L7.5 9.5H4z"/><path class="wave" d="M15.5 9a4.2 4.2 0 0 1 0 6M18 6.8a7.6 7.6 0 0 1 0 10.4"/></svg>
          </button>
          <button class="rbtn sharebtn" type="button" aria-label="Share this video">
            <svg viewBox="0 0 24 24"><path d="M12 15V4m0 0L8 8m4-4 4 4M5 14v5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-5"/></svg>
          </button>
        </div>
        <div class="prog" aria-hidden="true"><i></i></div>
      </div>`;
    const vd = card.querySelector('video');
    vd.addEventListener('waiting', ()=>card.classList.add('buffering'));
    vd.addEventListener('playing', ()=>card.classList.remove('buffering'));
    vd.addEventListener('canplay', ()=>card.classList.remove('buffering'));
    frag.appendChild(card);
  });
  loading.remove();
  feed.appendChild(frag);

  const cards = [...feed.querySelectorAll('.card')];
  let soundOn = false;
  let current = null;

  const videoOf = c => c.querySelector('video');

  // ---- bounded preload window (the TikTok trick): current + next buffer
  // in full, prev + next-next hold metadata only, and every other card is
  // fully DETACHED (src removed + load()) so mobile Safari never carries
  // more than ~4-5 live video elements no matter how far you scroll. ----
  function attach(vd, pl){
    vd.preload = pl;
    if(!vd.getAttribute('src')){ vd.src = vd.dataset.src; }
  }
  function detach(c){
    const vd = videoOf(c);
    if(vd && vd.getAttribute('src')){
      if(!vd.paused) vd.pause();
      vd.removeAttribute('src');
      vd.load();
      c.querySelector('.stage').classList.remove('playing');
      c.classList.remove('buffering');
    }
  }
  function applyWindow(i){
    cards.forEach((c, j)=>{
      const d = j - i;
      if(d === 0 || d === 1) attach(videoOf(c), 'auto');
      else if(d === -1 || d === 2) attach(videoOf(c), 'metadata');
      else detach(c);
    });
  }

  function play(c){
    const vd = videoOf(c);
    attach(vd, 'auto');
    vd.muted = !soundOn;
    vd.play().then(()=>{
      c.querySelector('.stage').classList.add('playing');
      c.classList.remove('paused');
    }).catch(err=>{
      // real autoplay refusal (iOS Low Power Mode): surface the play glyph
      // so the poster is not a dead end. AbortError from fast swipes is noise.
      if(err && err.name === 'NotAllowedError') c.classList.add('paused');
    });
  }
  function pause(c){ const vd = videoOf(c); if(vd && !vd.paused) vd.pause(); }

  // Start the incoming card as it crosses 40% mid-swipe so it is already
  // rolling when the snap settles; commit it as current at 60%.
  const io = new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      const c = en.target;
      if(en.intersectionRatio >= 0.6){
        if(current && current !== c) pause(current);
        current = c;
        applyWindow(+c.dataset.idx);
        play(c);
        bindProgress(c);
        history.replaceState(null, '', '#' + c.id);
      }else if(en.intersectionRatio >= 0.4){
        if(c !== current) play(c);
      }else{
        if(c !== current) pause(c);
      }
    });
  }, {root: feed, threshold: [0, .4, .6]});

  // tap = play/pause
  feed.addEventListener('click', e=>{
    const tap = e.target.closest('.tap');
    if(tap){
      const c = tap.closest('.card'); const vd = videoOf(c);
      if(vd.paused){ play(c); } else { vd.pause(); c.classList.add('paused'); }
      return;
    }
    const cap = e.target.closest('.cap');
    if(cap){ cap.classList.toggle('open'); return; }
    const mb = e.target.closest('.mutebtn');
    if(mb){ setSound(!soundOn); return; }
    const sb = e.target.closest('.sharebtn');
    if(sb){
      const c = sb.closest('.card');
      const url = location.origin + location.pathname + '#' + c.id;
      const title = c.querySelector('.title').textContent;
      if(navigator.share){ navigator.share({title: title + ' - Alaska AI', url}).catch(()=>{}); }
      else{
        navigator.clipboard.writeText(url).then(()=>{
          sb.classList.add('toast'); setTimeout(()=>sb.classList.remove('toast'), 1200);
        });
      }
    }
  });

  function setSound(on){
    soundOn = on;
    document.body.classList.toggle('muted', !on);
    cards.forEach(c=>{ const vd = videoOf(c); if(vd) vd.muted = !on; });
    // wave lines hidden when muted
    document.querySelectorAll('.mutebtn .wave').forEach(w=>{ w.style.opacity = on ? 1 : .25; });
    if(on && current){ const vd = videoOf(current); if(vd.paused) play(current); }
  }
  document.getElementById('unmute').addEventListener('click', ()=>setSound(true));
  setSound(false);

  // progress hairline: driven by requestVideoFrameCallback on the active
  // video (one paint-aligned update per presented frame, suspends itself
  // while paused), timeupdate as the fallback. scaleX never causes layout.
  const hasRVFC = 'requestVideoFrameCallback' in HTMLVideoElement.prototype;
  let progVd = null, progBar = null, progId = 0;
  function progTick(){
    if(progVd && progVd.duration){
      progBar.style.transform = 'scaleX(' + (progVd.currentTime / progVd.duration) + ')';
    }
  }
  function progLoop(){
    progTick();
    progId = progVd.requestVideoFrameCallback(progLoop);
  }
  function bindProgress(c){
    const vd = videoOf(c);
    if(vd === progVd) return;
    if(progVd){
      if(hasRVFC && progId) progVd.cancelVideoFrameCallback(progId);
      if(!hasRVFC) progVd.removeEventListener('timeupdate', progTick);
      if(progBar) progBar.style.transform = 'scaleX(0)';
    }
    progVd = vd;
    progBar = c.querySelector('.prog i');
    if(hasRVFC){ progId = vd.requestVideoFrameCallback(progLoop); }
    else{ vd.addEventListener('timeupdate', progTick); }
  }

  // keyboard + stepper
  function step(dir){
    const i = current ? +current.dataset.idx : 0;
    const t = cards[Math.min(cards.length-1, Math.max(0, i + dir))];
    if(t) t.scrollIntoView({behavior:'smooth'});
  }
  document.getElementById('prev').addEventListener('click', ()=>step(-1));
  document.getElementById('next').addEventListener('click', ()=>step(1));
  window.addEventListener('keydown', e=>{
    if(e.key === 'ArrowDown' || e.key === 'PageDown'){ e.preventDefault(); step(1); }
    if(e.key === 'ArrowUp' || e.key === 'PageUp'){ e.preventDefault(); step(-1); }
    if(e.key === ' '){ e.preventDefault();
      if(current){ const vd = videoOf(current);
        if(vd.paused){ play(current); } else { vd.pause(); current.classList.add('paused'); } } }
    if(e.key.toLowerCase() === 'm'){ setSound(!soundOn); }
  });

  // deep link: jump before observing so the observer's first pass attaches
  // the linked card's window, not card 0's
  if(location.hash){
    const t = document.getElementById(location.hash.slice(1));
    if(t) t.scrollIntoView();
  }
  cards.forEach(c=>io.observe(c));
})();
</script>
</body>
</html>
